# Prometheus Configuration for Crypto Volatility Detection
# This file configures Prometheus to scrape metrics from our services

global:
  scrape_interval: 15s  # How often to scrape targets
  evaluation_interval: 15s  # How often to evaluate rules
  external_labels:
    monitor: 'crypto-volatility-monitor'
    environment: 'development'

# Scrape configurations
scrape_configs:
  # FastAPI Service Metrics (Port 8000)
  - job_name: 'api'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'crypto-api'
          component: 'fastapi'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Kafka Lag Monitor Metrics (Port 9091)
  - job_name: 'kafka-lag-monitor'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          service: 'kafka-monitor'
          component: 'consumer-lag'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 5s

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'
